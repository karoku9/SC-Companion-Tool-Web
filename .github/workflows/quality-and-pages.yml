name: Quality and Pages

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Test clean UI generation
        run: |
          node --test tests/ui-clean-rebuild.test.js
          node --test tests/ui-rebuild.test.js
      - name: Test design system
        run: node --test tests/design-system.test.js
      - name: Test legacy checkpoint compatibility when present
        run: |
          [ ! -f tests/checkpoint2.test.js ] || node --test tests/checkpoint2.test.js
          [ ! -f tests/checkpoint3.test.js ] || node --test tests/checkpoint3.test.js
      - name: Test locations
        run: node --test tests/locations.test.js
      - name: Test missions
        run: node --test tests/missions.test.js
      - name: Test roadmap
        run: node --test tests/roadmap.test.js
      - name: Test starmap
        run: node --test tests/starmap.test.js
      - name: Test product shell and changelog
        run: node --test tests/product-shell.test.js
      - name: Test cargo lifecycle
        run: node --test tests/cargo-state.test.js
      - name: Test cargo corrections
        run: node --test tests/cargo-corrections.test.js
      - name: Test route corrections
        run: node --test tests/route-corrections.test.js
      - name: Test route planner
        run: node --test tests/route-planner.test.js
      - name: Test cargo zones and workspaces
        run: |
          node --test tests/cargo-zone-model.test.js
          node --test tests/workspace-consolidation.test.js
      - name: Test any additional suites
        run: |
          for file in tests/*.test.js; do
            case "$file" in
              tests/checkpoint2.test.js|tests/checkpoint3.test.js|tests/locations.test.js|tests/missions.test.js|tests/roadmap.test.js|tests/starmap.test.js|tests/product-shell.test.js|tests/cargo-state.test.js|tests/cargo-corrections.test.js|tests/route-corrections.test.js|tests/route-planner.test.js|tests/cargo-zone-model.test.js|tests/workspace-consolidation.test.js|tests/ui-clean-rebuild.test.js|tests/ui-rebuild.test.js|tests/design-system.test.js|tests/planner.test.js) ;;
              *) node --test "$file" ;;
            esac
          done
      - name: Test mission parsing
        run: node --test --test-name-pattern="mission text" tests/planner.test.js
      - name: Test route grouping
        run: node --test --test-name-pattern="dependency route" tests/planner.test.js
      - name: Test delivery operation
        run: node --test --test-name-pattern="delivery operation exists" tests/planner.test.js
      - name: Test delivery mission identity
        run: node --test --test-name-pattern="includes mission name" tests/planner.test.js
      - name: Test delivery pickup origin
        run: node --test --test-name-pattern="includes pickup origin" tests/planner.test.js
      - name: Test cargo accessibility
        run: node --test --test-name-pattern="cargo plan" tests/planner.test.js
      - name: Test ship profiles
        run: node --test --test-name-pattern="starter ship" tests/planner.test.js
      - name: Check JavaScript syntax
        run: |
          node --check product-pages.js
          node --check product-shell.js
          node --check locations.js
          node --check location-profiles.js
          node --check arrival-estimates.js
          node --check missions.js
          node --check mission-text.js
          node --check route-planner.js
          node --check route-planner-engine.js
          node --check route-corrections.js
          node --check route-progress.js
          node --check ship-catalog.js
          node --check cargo-planner.js
          node --check cargo-state.js
          node --check cargo-layout.js
          node --check cargo-zone-model.js
          node --check session-store.js
          node --check starmap-data.js
          node --check roadmap.js
          node --check app.js
          node --check sections.js
          node --check mission-view.js
          node --check route-view.js
          node --check route-corrections-view.js
          node --check route-planner-view.js
          node --check cargo-view.js
          node --check load-operations-view.js
          node --check cargo-corrections-view.js
          node --check cargo-zone-editor-view.js
          node --check changelog-view.js
          node --check ux-shell.js
          node --check workspace-shell.js
          node --check hangar-view.js
          node --check starmap-view.js
          node --check location-intel-view.js
          node --check roadmap-view.js
          node --check ui-v2.js
          node --check ui-v2-operations.js
          node --check ui-v2-shell.js

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Quality and Pages

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run existing tests
        run: |
          for file in tests/*.test.js; do
            if [ "$file" != "tests/planner.test.js" ]; then node --test "$file"; fi
          done
      - name: Test mission parsing
        run: node --test --test-name-pattern="mission text" tests/planner.test.js
      - name: Test route grouping
        run: node --test --test-name-pattern="dependency route" tests/planner.test.js
      - name: Test delivery operation
        run: node --test --test-name-pattern="delivery operation exists" tests/planner.test.js
      - name: Test delivery mission identity
        run: node --test --test-name-pattern="includes mission name" tests/planner.test.js
      - name: Test delivery pickup origin
        run: node --test --test-name-pattern="includes pickup origin" tests/planner.test.js
      - name: Test cargo accessibility
        run: node --test --test-name-pattern="cargo plan" tests/planner.test.js
      - name: Test ship profiles
        run: node --test --test-name-pattern="starter ship" tests/planner.test.js
      - name: Check JavaScript syntax
        run: |
          node --check product-pages.js
          node --check product-shell.js
          node --check locations.js
          node --check location-profiles.js
          node --check arrival-estimates.js
          node --check missions.js
          node --check mission-text.js
          node --check route-planner.js
          node --check ship-catalog.js
          node --check cargo-planner.js
          node --check session-store.js
          node --check starmap-data.js
          node --check roadmap.js
          node --check app.js
          node --check sections.js
          node --check mission-view.js
          node --check route-view.js
          node --check cargo-view.js
          node --check hangar-view.js
          node --check starmap-view.js
          node --check location-intel-view.js
          node --check roadmap-view.js

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: One-shot Checkpoint 4C publication

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/temporary-publish-checkpoint-4c.yml
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: checkpoint-4c-publication
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'issue_comment' && github.event.issue.number == 1 && github.event.comment.body == '/publish-checkpoint-4c') ||
      (github.event_name == 'pull_request_target' && github.event.pull_request.head.ref == 'trigger/checkpoint-4c-publication')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Reconstruct verified source archives
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import json
          import os
          import re
          import urllib.request

          repo = os.environ['REPOSITORY']
          token = os.environ['GH_TOKEN']
          request = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/issues/1/comments?per_page=100',
              headers={
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
              },
          )
          with urllib.request.urlopen(request) as response:
              comments = json.load(response)

          groups = {'CODEX_PART': {}, 'PATCH_PART': {}}
          pattern = re.compile(r'^(CODEX_PART|PATCH_PART)_(\d+):(.*)$', re.S)
          for comment in comments:
              match = pattern.match(comment.get('body', ''))
              if match:
                  groups[match.group(1)][int(match.group(2))] = match.group(3).strip()

          expected = {
              'CODEX_PART': ('/tmp/codex4b.tar.xz', '584332d533146e36725a9f576dacb76a23cb6c02a79613706776e67ac0910d91'),
              'PATCH_PART': ('/tmp/assistant4c.tar.xz', 'ef127c6813e2c2c42a93fa2dafad9eb56c861fe34000a5037cab5f5c55850268'),
          }
          for name, (path, expected_hash) in expected.items():
              parts = groups[name]
              if not parts or sorted(parts) != list(range(max(parts) + 1)):
                  raise SystemExit(f'{name} is incomplete: received indexes {sorted(parts)}')
              raw = base64.b64decode(''.join(parts[index] for index in sorted(parts)), validate=True)
              digest = hashlib.sha256(raw).hexdigest()
              if digest != expected_hash:
                  raise SystemExit(f'{name} checksum mismatch: {digest}')
              with open(path, 'wb') as handle:
                  handle.write(raw)
              print(f'{name}: {len(parts)} parts, {len(raw)} bytes, SHA-256 {digest}')
          PY

          mkdir -p /tmp/codex4b /tmp/assistant4c
          tar -xJf /tmp/codex4b.tar.xz -C /tmp/codex4b
          tar -xJf /tmp/assistant4c.tar.xz -C /tmp/assistant4c

      - name: Preserve deployment workflow
        run: cp .github/workflows/deploy-pages.yml /tmp/deploy-pages.yml

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create Codex Checkpoint 4B backup branch
        run: |
          git checkout -B backup/codex-checkpoint-4b origin/main
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/codex4b/. .
          mkdir -p .github/workflows
          cp /tmp/deploy-pages.yml .github/workflows/deploy-pages.yml
          git add -A
          git commit -m "Backup Codex Checkpoint 4B baseline"
          git push --force-with-lease origin backup/codex-checkpoint-4b
          echo "BACKUP_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Build, test and publish production main
        run: |
          git checkout -B main origin/main
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/codex4b/. .
          cp -a /tmp/assistant4c/. .
          mkdir -p .github/workflows
          cp /tmp/deploy-pages.yml .github/workflows/deploy-pages.yml

          node validate-locations.js
          node --test \
            tests/checkpoint2.test.js \
            tests/checkpoint3.test.js \
            tests/checkpoint4a.test.js \
            tests/checkpoint4b.test.js \
            tests/checkpoint4c.test.js

          git add -A
          git commit -m "Publish Codex Checkpoint 4B and Assistant Checkpoint 4C"
          git push origin main
          echo "PRODUCTION_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Record completion and remove temporary transfer data
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TRIGGER_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          repo = os.environ['REPOSITORY']
          token = os.environ['GH_TOKEN']
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          }

          req = urllib.request.Request(f'https://api.github.com/repos/{repo}/issues/1/comments?per_page=100', headers=headers)
          with urllib.request.urlopen(req) as response:
              comments = json.load(response)
          for comment in comments:
              if comment.get('body', '').startswith(('CODEX_PART_', 'PATCH_PART_')):
                  delete = urllib.request.Request(comment['url'], headers=headers, method='DELETE')
                  with urllib.request.urlopen(delete):
                      pass

          issue_message = {
              'body': (
                  'One-shot transfer completed successfully.\n\n'
                  f'- Codex backup branch: `backup/codex-checkpoint-4b` at `{os.environ.get("BACKUP_SHA", "unknown")}`\n'
                  f'- Published `main`: `{os.environ.get("PRODUCTION_SHA", "unknown")}`\n'
                  '- All source archives passed SHA-256 verification.\n'
                  '- All automated tests passed before publication.\n'
                  '- Temporary payload comments were deleted.'
              ),
              'state': 'closed',
              'state_reason': 'completed',
          }
          close_issue = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/issues/1',
              data=json.dumps(issue_message).encode(),
              headers={**headers, 'Content-Type': 'application/json'},
              method='PATCH',
          )
          with urllib.request.urlopen(close_issue):
              pass

          pr_number = os.environ.get('TRIGGER_PR_NUMBER', '').strip()
          if pr_number:
              close_pr = urllib.request.Request(
                  f'https://api.github.com/repos/{repo}/pulls/{pr_number}',
                  data=json.dumps({'state': 'closed'}).encode(),
                  headers={**headers, 'Content-Type': 'application/json'},
                  method='PATCH',
              )
              with urllib.request.urlopen(close_pr):
                  pass
              delete_ref = urllib.request.Request(
                  f'https://api.github.com/repos/{repo}/git/refs/heads/trigger/checkpoint-4c-publication',
                  headers=headers,
                  method='DELETE',
              )
              try:
                  with urllib.request.urlopen(delete_ref):
                      pass
              except urllib.error.HTTPError as exc:
                  if exc.code != 422:
                      raise
          PY

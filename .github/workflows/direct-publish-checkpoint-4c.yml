name: Publish verified Checkpoint 4B package

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/direct-publish-checkpoint-4c.yml

permissions:
  contents: write
  issues: read

concurrency:
  group: direct-checkpoint-4b-publication
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Reconstruct and verify production package
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import json
          import os
          import re
          import urllib.request

          repo = os.environ['REPOSITORY']
          token = os.environ['GH_TOKEN']
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          }

          comments = []
          page = 1
          while True:
              request = urllib.request.Request(
                  f'https://api.github.com/repos/{repo}/issues/3/comments?per_page=100&page={page}',
                  headers=headers,
              )
              with urllib.request.urlopen(request) as response:
                  batch = json.load(response)
              comments.extend(batch)
              if len(batch) < 100:
                  break
              page += 1

          parts = {}
          marker = re.compile(r'PKG_PART_(\d+):')
          for comment in comments:
              body = comment.get('body', '')
              matches = list(marker.finditer(body))
              for index, match in enumerate(matches):
                  end = matches[index + 1].start() if index + 1 < len(matches) else len(body)
                  payload = re.sub(r'\s+', '', body[match.end():end])
                  part_index = int(match.group(1))
                  if part_index in parts and parts[part_index] != payload:
                      raise SystemExit(f'Conflicting duplicate PKG_PART_{part_index:02d}')
                  parts[part_index] = payload

          required = list(range(15))
          indexes = sorted(parts)
          if indexes != required:
              raise SystemExit(f'Expected package parts {required}, received {indexes}')

          encoded = ''.join(parts[index] for index in required)
          package = base64.b64decode(encoded, validate=True)
          digest = hashlib.sha256(package).hexdigest()
          expected = '9c6092b66c1ea53bdd7bdf1e6e047b87485fe9018d6433165616eb64d0c44350'
          if digest != expected:
              raise SystemExit(f'Package checksum mismatch: {digest}')

          with open('/tmp/publish-min.tar.gz', 'wb') as handle:
              handle.write(package)
          print(f'Package verified: {len(package)} bytes; SHA-256 {digest}')
          PY

          mkdir -p /tmp/publish-package
          tar -xzf /tmp/publish-min.tar.gz -C /tmp/publish-package
          test -f /tmp/publish-package/index.html
          test -f /tmp/publish-package/CHECKPOINT-4B.md
          test -f /tmp/publish-package/tests/checkpoint4c.test.js

      - name: Replace repository contents with verified package
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/publish-package/. .

      - name: Validate production package
        run: |
          node validate-locations.js
          node --test \
            tests/checkpoint2.test.js \
            tests/checkpoint3.test.js \
            tests/checkpoint4a.test.js \
            tests/checkpoint4b.test.js \
            tests/checkpoint4c.test.js

      - name: Commit and push verified application to main
        run: |
          git add -A
          git commit -m "Publish Checkpoint 4B real-use alpha and Companion ledger fix"
          git push origin HEAD:main
